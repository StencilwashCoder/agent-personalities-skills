<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric's Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #2a2a3e;
        }
        h1 { font-size: 2rem; color: #fff; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 0.9rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .card {
            background: #111118;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #1f1f2e;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #3a3a5e; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-new { background: #22c55e22; color: #22c55e; }
        .status-pending { background: #f59e0b22; color: #f59e0b; }
        .status-read { background: #6b728022; color: #9ca3af; }
        .timestamp {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .content-preview {
            color: #aaa;
            font-size: 0.9rem;
            max-height: 150px;
            overflow: hidden;
            position: relative;
        }
        .content-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, #111118);
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
        }
        .btn:hover { opacity: 0.9; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 16px;
            border-radius: 6px;
            background: #1a1a2e;
            color: #888;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .nav-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat {
            background: #111118;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1f1f2e;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .filter-section {
            margin-bottom: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Command Center</h1>
            <p class="subtitle">All your reports, decisions, and validation experiments in one place</p>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="unread-count">0</div>
                <div class="stat-label">Unread Reports</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="decisions-due">0</div>
                <div class="stat-label">Decisions Due</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="active-experiments">0</div>
                <div class="stat-label">Active Experiments</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="today-reports">0</div>
                <div class="stat-label">Today's Reports</div>
            </div>
        </div>

        <div class="nav">
            <button class="nav-btn active" onclick="filterReports('all')">All Reports</button>
            <button class="nav-btn" onclick="filterReports('content')">📊 Content</button>
            <button class="nav-btn" onclick="filterReports('decisions')">🧠 Decisions</button>
            <button class="nav-btn" onclick="filterReports('ideas')">💡 Idea Validation</button>
            <button class="nav-btn" onclick="filterReports('board')">📈 Board Deck</button>
        </div>

        <div id="reports-container" class="grid">
            <!-- Reports will be loaded here -->
            <div class="empty-state">
                <p>Loading reports...</p>
            </div>
        </div>
    </div>

    <script>
        // Report data will be populated by the generator
        const reports = REPORTS_DATA_PLACEHOLDER;

        function filterReports(type) {
            // Update active button
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filter and render
            const filtered = type === 'all' 
                ? reports 
                : reports.filter(r => r.type === type);
            renderReports(filtered);
        }

        function renderReports(reportList) {
            const container = document.getElementById('reports-container');
            
            if (reportList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <p>No reports found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = reportList.map(report => `
                <div class="card" data-id="${report.id}">
                    <div class="card-header">
                        <div class="card-title">
                            ${getIcon(report.type)}
                            ${report.title}
                        </div>
                        <span class="status-badge status-${report.status}">${report.status}</span>
                    </div>
                    <div class="timestamp">${formatTime(report.timestamp)}</div>
                    <div class="content-preview">${report.preview}</div>
                    <div class="actions">
                        <a href="${report.fullUrl}" class="btn btn-primary" target="_blank">
                            📄 View Full Report
                        </a>
                        <button class="btn btn-secondary" onclick="markRead('${report.id}')">
                            ✓ Mark Read
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getIcon(type) {
            const icons = {
                'content': '📊',
                'decisions': '🧠',
                'ideas': '💡',
                'board': '📈'
            };
            return icons[type] || '📄';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = (now - date) / 1000;
            
            if (diff < 3600) return Math.floor(diff / 60) + ' minutes ago';
            if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function markRead(id) {
            // In real implementation, this would call an API
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) {
                card.querySelector('.status-badge').textContent = 'read';
                card.querySelector('.status-badge').className = 'status-badge status-read';
            }
        }

        function updateStats() {
            const unread = reports.filter(r => r.status === 'new').length;
            const today = reports.filter(r => {
                const d = new Date(r.timestamp);
                const now = new Date();
                return d.toDateString() === now.toDateString();
            }).length;
            
            document.getElementById('unread-count').textContent = unread;
            document.getElementById('today-reports').textContent = today;
            
            // These would come from separate data sources
            document.getElementById('decisions-due').textContent = '0';
            document.getElementById('active-experiments').textContent = '0';
        }

        // Initialize
        renderReports(reports);
        updateStats();
    </script>
</body>
</html>
