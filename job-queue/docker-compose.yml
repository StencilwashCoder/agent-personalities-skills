version: '3.8'

services:
  ai-worker:
    build: .
    container_name: ai-job-worker
    restart: unless-stopped
    environment:
      # MinIO / S3 Configuration
      - S3_ENDPOINT=https://s3.chainbytes.io
      - S3_ACCESS_KEY=chainbytes
      - S3_SECRET_KEY=chainbytes2026
      - S3_REGION=us-east-1
      - JOBS_BUCKET=ai-jobs
      
      # LM Studio Configuration
      # Change this to your LM Studio URL
      - LMSTUDIO_URL=http://host.docker.internal:1234
      # - LMSTUDIO_API_KEY=your-api-key-if-set
      
      # Worker Configuration
      - WORKER_ID=${WORKER_ID:-worker-1}
      - POLL_INTERVAL=1.0
      - MAX_JOBS=1000
    
    # If LM Studio is on host machine, use host networking
    # For Linux:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    # For Mac/Windows, host.docker.internal works automatically
    # Uncomment if needed:
    # network_mode: host
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
